<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline — Student Companion Berlin</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #18181c;
    color: #e9e7e2;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    text-align: center;
    padding: 24px;
  }
  .card { max-width: 360px; }
  .mark {
    width: 48px;
    height: 48px;
    margin: 0 auto 18px;
    border-radius: 9px;
    background: #1c1c21;
    border: 1px solid #3b3a42;
    color: #faf9f5;
    font-weight: 700;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  h1 { font-size: 17px; margin: 0 0 8px; }
  p { font-size: 13.5px; color: #a4a1ab; line-height: 1.6; margin: 0; }
  button {
    margin-top: 18px;
    background: transparent;
    border: 1px solid #3b3a42;
    color: #e9e7e2;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">SCB</div>
    <h1>You're offline</h1>
    <p>Student Companion Berlin needs a connection to fetch new answers. Anything you've already opened is still available once you're back online.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
